worker_processes auto;

events {
    worker_connections 1024;
}

http {
    include       mime.types;
    default_type  application/octet-stream;
    sendfile      on;

    server {
        listen 80;
        server_name www.justmine.cn;

        # --- 02. 前端官网门户 (Trade Platform) ---
        location / {
            proxy_pass http://zk-website:80;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
        }

        # --- 01. 智控中枢沙盘 (AI Cockpit) ---
        # 严格对齐 SOP-V2.1 战术指示 #2
        location ^~ /ai-manager/ {
            proxy_pass http://zk-intelligence:3000/;
            
            # 核心：拦截后端生成的根路径重定向，强制送回 /ai-manager/
            proxy_redirect / /ai-manager/;
            
            # 传递原始请求头，确保 POST 请求合法
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;

            # 允许跨域（如果需要）并禁用缓存
            add_header Cache-Control "no-cache, no-store, must-revalidate";
        }
    }
}
