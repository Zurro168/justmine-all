worker_processes auto;

events {
    worker_connections 1024;
}

http {
    include       mime.types;
    default_type  application/octet-stream;
    sendfile      on;

    # 关键：使用 Docker 默认的 DNS 解析器 (127.0.0.11)
    # 这样 Nginx 在启动时即使找不到 backend 也会通过动态变量解析，而不会直接挂掉
    resolver 127.0.0.11 valid=30s;

    server {
        listen 80;
        server_name _; 

        # --- 官网门户 (Trade Platform) ---
        location / {
            proxy_pass http://zk-website:80;
        }

        # --- 智控沙盘 (用变量形式，防止 Nginx 因为找不到 host 而拒在门外) ---
        location ^~ /ai-manager/ {
            set $upstream_cockpit zk-intelligence;
            proxy_pass http://$upstream_cockpit:3000/;
            proxy_redirect / /ai-manager/;
        }

        # --- 企微 Webhook ---
        location ^~ /wecom/ {
            set $upstream_wecom zk-intelligence;
            proxy_pass http://$upstream_wecom:5000/;
        }
    }
}
