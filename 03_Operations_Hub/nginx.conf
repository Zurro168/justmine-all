worker_processes auto;

events {
    worker_connections 1024;
}

http {
    include       mime.types;
    default_type  application/octet-stream;
    sendfile      on;

    server {
        listen 80;
        server_name www.justmine.cn;

        # 1. 前端门户
        location / {
            proxy_pass http://zk-website:80;
        }

        # 2. 智控大屏 (AI Cockpit)
        location ^~ /ai-manager/ {
            proxy_pass http://zk-intelligence:3000/;
            proxy_redirect / /ai-manager/;
            proxy_set_header Host $host;
        }

        # 3. 企微 Webhook 核心通道 (Real-time Gate)
        # 对应 wecom_bot.py 的 5000 端口
        location ^~ /wecom/ {
            proxy_pass http://zk-intelligence:5000/;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
        }
    }
}
