worker_processes auto;

events {
    worker_connections 1024;
}

http {
    include       mime.types;
    default_type  application/octet-stream;
    sendfile      on;

    # Security headers
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-XSS-Protection "1; mode=block" always;

    # Docker DNS
    resolver 127.0.0.11 valid=30s;

    # HTTP -> HTTPS redirect (uncomment after SSL config)
    # if ($scheme = http) {
    #     return 301 https://$host$request_uri;
    # }

    server {
        listen 80;
        server_name _;

        # SSL (uncomment and place cert files)
        listen 443 ssl http2;
        ssl_certificate /etc/nginx/ssl/cert.pem;
        ssl_certificate_key /etc/nginx/ssl/key.pem;
        ssl_protocols TLSv1.2 TLSv1.3;
        ssl_ciphers HIGH:!aNULL:!MD5;

        # --- е®ҳзҪ‘й—ЁжҲ· (Trade Platform) ---
        location / {
            set $up_website zk-website;
            proxy_pass http://$up_website:80;
        }

        # --- жҷәжҺ§жІҷзӣҳ (Dashboard) ---
        location ^~ /ai-manager/ {
            set $upstream_cockpit zk-dashboard;
            rewrite ^/ai-manager/(.*) /$1 break;
            proxy_pass http://$upstream_cockpit:3000;
            proxy_redirect / /ai-manager/;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        # --- дјҒеҫ® Webhook (AI Bot) ---
        location ^~ /wecom {
            set $upstream_wecom zk-dashboard;
            proxy_pass http://$upstream_wecom:5000;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }
    }
}
