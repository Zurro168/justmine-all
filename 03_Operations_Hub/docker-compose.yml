services:
  # --- 01. 智控沙盘后台 ---
  zk-dashboard:
    build:
      context: ../01_Intelligence_Engine/
      dockerfile: openclaw-deployment/Dockerfile
    container_name: zk-dashboard
    command: python openclaw-deployment/app_dashboard.py
    restart: always
    env_file: .env.justmine
    networks:
      - justmine-net

  # --- 01. 企微机器人后台 ---
  zk-ai-bot:
    build:
      context: ../01_Intelligence_Engine/
      dockerfile: openclaw-deployment/Dockerfile
    container_name: zk-ai-bot
    command: python openclaw-deployment/wecom_bot.py
    restart: always
    env_file: .env.justmine
    networks:
      - justmine-net

  # --- 01. 行情早报定时任务 (Scout-Scheduler) ---
  zk-scout-scheduler:
    build:
      context: ../01_Intelligence_Engine/
      dockerfile: openclaw-deployment/Dockerfile
    container_name: zk-scout-scheduler
    # 指向准确的定时任务脚本
    command: python skills/market_scout/scout_scheduler.py
    restart: always
    env_file: .env.justmine
    networks:
      - justmine-net

  # --- 02. 前端官网 ---
  zk-website:
    build:
      context: ../02_Trade_Platform/
    container_name: zk-website
    ports:
      - "5173:80"
    restart: always
    networks:
      - justmine-net

  # --- 03. 运维中枢 ---
  zk-nginx:
    image: nginx:latest
    container_name: zk-nginx
    ports:
      - "80:80"
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      - zk-dashboard
      - zk-ai-bot
      - zk-website
    networks:
      - justmine-net

networks:
  justmine-net:
    driver: bridge
