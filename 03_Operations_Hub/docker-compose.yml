version: '3.8'

services:
  # --- 01. 智控引擎 (对齐云端真实的扁平路径) ---
  zk-intelligence:
    build:
      context: ../01_Intelligence_Engine/
      dockerfile: openclaw-deployment/Dockerfile
    container_name: zk-intelligence
    env_file: .env.justmine
    restart: always
    networks:
      - justmine-net

  # --- 02. 前端门户 ---
  zk-website:
    build:
      context: ../02_Trade_Platform/
    container_name: zk-website
    ports:
      - "5173:80"
    restart: always
    networks:
      - justmine-net

  # --- 03. 运维中枢 ---
  zk-nginx:
    image: nginx:latest
    container_name: zk-nginx
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      - zk-intelligence
      - zk-website
    networks:
      - justmine-net

networks:
  justmine-net:
    driver: bridge
